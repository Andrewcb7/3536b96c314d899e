      "props": {
        "headline": "Buildings Account for 40% of Global Carbon Emissions",
        "body": "The built environment is the single largest contributor to greenhouse gas emissions worldwide. In Canada, buildings account for 17% of national GHG emissions directly, and up to 30% when including construction and materials. As climate targets tighten under the Paris Agreement and Canada's 2050 net-zero commitment, the building industry faces a fundamental transformation. Traditional construction practices—designed for a world of cheap energy and unlimited carbon budgets—are no longer viable. Building science must evolve from optimizing for cost alone to optimizing for energy performance, embodied carbon, occupant health, and climate resilience simultaneously.",
        "variant": "evidence-wall",

    "comp-43be9b87": {
      "_type": "ClientContext",
      "props": {
        "headline": "BC Energy Step Code: A Performance-Based Framework",
        "body": "British Columbia introduced the BC Energy Step Code in 2017 as the first performance-based energy code in Canada. Rather than prescribing specific materials or assemblies, it establishes five progressive steps of energy efficiency for Part 9 residential buildings and four steps for Part 3 commercial buildings. Each step defines maximum energy use intensity (EUI) and airtightness targets. By 2032, all new construction in BC must meet the highest step—effectively net-zero energy ready. This approach gives designers and CAD professionals flexibility in how they achieve performance targets, encouraging innovation in envelope design, mechanical systems, and building geometry.",
        "sections": [
          {
            "title": "Step 1 – Enhanced Compliance",
            "content": "10-20% better than base code. Improved air barrier continuity, basic thermal bridging mitigation."
          },
          {
            "title": "Step 2 – High Performance",
            "content": "20-40% better. Enhanced insulation, HRV requirements, reduced thermal bridging at critical junctions."
          },
          {
            "title": "Step 3 – Near Passive House",
            "content": "40-50% better. High-performance windows (triple-glazed), continuous exterior insulation, airtightness ≤1.5 ACH50."
          },
          {
            "title": "Step 4 – Net-Zero Energy Ready (Part 3)",
            "content": "Maximum performance tier for commercial buildings. Requires energy modelling and blower door testing."
          },
          {
            "title": "Step 5 – Net-Zero Energy Ready (Part 9)",
            "content": "Highest residential tier. EUI targets approach Passive House levels. Solar-ready requirements."
          }
        ],
        "variant": "landscape-scan",
        "context": "British Columbia has emerged as Canada's leader in performance-based building energy codes. KPU's CAD graduates will work primarily within BC's regulatory framework, making mastery of the Step Code essential for professional practice."
      }
    },

    "comp-bdea825c": {
      "_type": "ClientContext",
      "props": {
        "headline": "North American Sustainable Building Landscape",
        "body": "Across North America, the convergence of climate policy, market demand, and technological innovation is reshaping construction. The US Inflation Reduction Act (2022) allocated $369B to clean energy including significant building efficiency incentives. ASHRAE 90.1 and the International Energy Conservation Code (IECC) continue to tighten baseline requirements. Mass timber construction codes have been updated in both the IBC (US) and NBC (Canada) to permit buildings up to 18 storeys. The cross-border harmonization of standards—particularly in areas like embodied carbon measurement (ISO 21930, EN 15978) and whole-building lifecycle assessment—is creating a unified professional knowledge base that CAD practitioners must master.",
        "sections": [
          {
            "title": "ASHRAE Standards Evolution",
            "content": "ASHRAE 90.1-2022 represents a 36% energy reduction vs. the 2004 baseline. Standard 189.1 (for high-performance green buildings) and 228P (standard method for evaluating zero-net-energy building performance) are setting the trajectory toward net-zero."
          },
          {
            "title": "Mass Timber Revolution",
            "content": "The 2021 IBC update permits mass timber up to 18 storeys (Type IV-A). North America now has 1,700+ mass timber projects completed or in design. CLT, NLT, DLT, and glulam systems require specialized CAD detailing for connections, fire encapsulation, and acoustic assemblies."
          },
          {
            "title": "Embodied Carbon Awareness",
            "content": "Buy Clean policies in the US (federal and state-level) and Canada's forthcoming embodied carbon regulations are making whole-building LCA a design requirement. Tools like Athena Impact Estimator, Tally, and One Click LCA integrate with BIM/CAD workflows."
          },
          {
            "title": "Electrification and Heat Pumps",
            "content": "Building electrification mandates (NYC Local Law 154, Vancouver's Zero Emissions Building Plan) are eliminating fossil fuel heating in new construction. Heat pump systems, district energy, and solar-ready design are becoming standard CAD scope."
          }
        ],
        "variant": "landscape-scan",
        "context": "As KPU graduates may work across North American jurisdictions, understanding the continental landscape of sustainable building standards, codes, and market trends is essential for career readiness and professional mobility."
      }
    },

    "comp-b8bded57": {
      "_type": "Methodology",
      "props": {
        "headline": "Sustainable Design Workflow for CAD Professionals",
        "phases": [
          {
            "title": "1. Early Design Analysis",
            "description": "Building orientation, massing studies, solar exposure analysis, and climate-responsive form generation. CAD tools enable rapid iteration of building geometry to optimize passive solar gain and minimize heating/cooling loads before detailed design begins."
          },
          {
            "title": "2. High-Performance Envelope Detailing",
            "description": "Continuous insulation strategies, thermal bridge-free connection details, air barrier continuity mapping, and window-to-wall ratio optimization. CAD professionals must detail transitions at slab edges, balconies, parapets, and penetrations to eliminate thermal bridges."
          },
          {
            "title": "3. Energy Modelling Integration",
            "description": "BIM-to-energy model workflows using EnergyPlus, HOT2000, or PHPP. CAD geometry exports directly to energy simulation tools. Iterative feedback loops between design changes and predicted energy performance drive the design toward Step Code/Passive House targets."
          },
          {
            "title": "4. Construction Documentation",
            "description": "Producing drawings that communicate performance intent—air barrier continuity plans, insulation schedules with R-value/RSI specifications, mechanical system coordination, and quality assurance checklists for on-site verification."
          },
          {
            "title": "5. Performance Verification",
            "description": "Supporting blower door testing, thermographic surveys, and commissioning documentation. As-built CAD models updated with verified performance data for building operations and future retrofit planning."
          }
        ],
        "variant": "phased-sequence",
        "title": "Sustainable Design Workflow for CAD Professionals",
        "description": "A five-phase workflow integrating sustainability analysis into every stage of the CAD process, from early massing studies through performance verification."
      }
    },

    "comp-d8b4d8e1": {
      "_type": "AccordionGroup",
      "props": {
        "headline": "Key Tools and Technologies for Sustainable CAD Practice",
        "items": [
          {
            "title": "Energy Modelling Software",
            "content": "HOT2000 (Natural Resources Canada) for Part 9 residential. EnergyPlus/OpenStudio for commercial. PHPP (Passive House Planning Package) for Passive House certification. All require accurate CAD geometry inputs—wall assemblies, window schedules, shading geometry."
          },
          {
            "title": "Thermal Bridging Calculators",
            "content": "THERM (Lawrence Berkeley National Lab) for 2D heat transfer analysis at junctions. Psi-Therm for linear thermal transmittance (Ψ-values). These tools quantify heat loss at slab edges, window frames, and structural connections that CAD details must resolve."
          },
          {
            "title": "Lifecycle Assessment (LCA) Tools",
            "content": "Athena Impact Estimator for Buildings (Canadian-developed, free). One Click LCA (integrates with Revit). Tally (Revit plugin). These calculate embodied carbon from material selections in CAD/BIM models."
          },
          {
            "title": "BIM and Parametric Design",
            "content": "Revit, ArchiCAD, and Rhino/Grasshopper enable parametric exploration of building forms optimized for energy performance. Dynamo and Grasshopper scripts can automate envelope optimization, daylighting analysis, and solar panel placement."
          },
          {
            "title": "Airtightness and Quality Assurance",
            "content": "Blower door testing equipment (Minneapolis Blower Door, Retrotec). Infrared thermography for thermal bridge detection. CAD professionals produce air barrier continuity plans that guide construction teams and are verified through these testing protocols."
          }
        ],
        "variant": "progressive-disclosure"
      }
    },
